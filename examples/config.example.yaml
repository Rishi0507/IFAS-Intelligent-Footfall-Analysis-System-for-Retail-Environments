# IPD example config — copy and edit, then:
#   python cctv_gender.py --video in.mp4 --output out/ --config my.yaml

detector:
  yolo_model: yolov8n.pt
  conf: 0.20
  device: cpu              # 'cuda' for GPU
  imgsz: null              # null = native resolution
  min_box_w: 20
  min_box_h: 30
  aspect_min: 0.15
  aspect_max: 6.0

face_detector:
  model_path: models/face_detection_yunet_2023mar.onnx
  conf_threshold: 0.45
  nms_threshold: 0.30
  top_k: 5000

face_gender:
  model: rizvandwiki/gender-classification-2
  input_size: 224
  female_label: female
  male_label: male
  conf_threshold: 0.70

clip:
  model: openai/clip-vit-base-patch32
  gender_male_prompts:
    - "a photo of a man"
    - "a photo of a male person"
  gender_female_prompts:
    - "a photo of a woman"
    - "a photo of a female person"
  uncertain_ratio: 1.8
  uncertain_face_threshold: 0.70

tracker:
  iou_threshold: 0.30
  centroid_max_dist: 80.0
  persist_frames: 3
  size_scale: 0.30

reid:
  enabled: true
  cosine_threshold: 0.75
  expiry_seconds: 30.0
  max_bank_size: 200

footfall:
  line: [[0.0, 0.7], [1.0, 0.7]]   # normalised coords
  direction: down                    # 'down' = entries, 'up' = exits

aggregator:
  bucket_seconds: 900                # 15-min buckets

pipeline:
  process_every_n_frames: 1
  max_frames: null
  dump_annotated_every: 30
  dump_dir: annotated_frames
